{{- $crt := .Files.Get "certs/server.crt" }}
{{- $key := .Files.Get "certs/server.key" }}
{{- $ca := .Files.Get "certs/ca.crt" }}
{{- if and $crt $key $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: k8s-efficiency-auditor-tls
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $crt | b64enc }}
  tls.key: {{ $key | b64enc }}
  ca.crt: {{ $ca | b64enc }}
{{- else }}
{{- fail "Certificate files missing in certs/ directory. Please generate tls.crt, tls.key, ca.crt and place them in the chart's certs/ folder." }}
{{- end }}
